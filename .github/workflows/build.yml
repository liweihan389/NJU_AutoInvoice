name: Build and Release App

# 触发条件：只有在推送 v 开头的版本标签时（比如 v1.0），或者手动点击时才触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 设置基础权限，允许 Actions 往你的仓库里写入 Release 发布信息
permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: 获取代码库
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: 编译打包 (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconsole --windowed --onefile --name "智能出库单" --add-data "template.pdf;." app.py
        Rename-Item -Path "dist\智能出库单.exe" -NewName "AutoInvoice_Windows.exe"

    - name: 编译打包并生成 DMG (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconsole --windowed --name "智能出库单" --add-data "template.pdf:." app.py
        mkdir dmg_staging
        mv dist/智能出库单.app dmg_staging/
        ln -s /Applications dmg_staging/Applications
        hdiutil create -volname "智能出库单" -srcfolder dmg_staging -ov -format UDZO dist/AutoInvoice_macOS.dmg

    - name: 上传 Windows 临时成品
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App
        path: dist/AutoInvoice_Windows.exe

    - name: 上传 macOS 临时成品
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: macOS-App
        path: dist/AutoInvoice_macOS.dmg

  # ==========================================
  # 新增的自动发布环节 (等待 build 环节全部成功后执行)
  # ==========================================
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') # 确保只有打标签时才执行发布
    steps:
      - name: 下载 Windows 成品
        uses: actions/download-artifact@v4
        with:
          name: Windows-App
          path: release_assets/windows

      - name: 下载 macOS 成品
        uses: actions/download-artifact@v4
        with:
          name: macOS-App
          path: release_assets/macos

      - name: 创建 GitHub Release 并上传文件
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/windows/AutoInvoice_Windows.exe
            release_assets/macos/AutoInvoice_macOS.dmg
          generate_release_notes: true